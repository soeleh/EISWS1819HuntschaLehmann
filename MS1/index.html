<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <meta charset="utf-8">
    <title>calmRunter</title>
    <style>
      #map {
        height: 400px;
        width: 400px;
      }
      html, body {
        height: 100%;
        margin: 5px;
        padding: 0;
      }
    </style>

    <script>
    var map;
    var infowindow;
    var service;
    var count;
    var duration;
    var pos;
    var placeLoc;
    var marker;

    function initMap() {
    map = new google.maps.Map(document.getElementById('map'), {
        zoom: 15
    });

    var directionsService = new google.maps.DirectionsService;
    var directionsDisplay = new google.maps.DirectionsRenderer;
    infoWindow = new google.maps.InfoWindow({ map: map });

      if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(function (position) {
              pos = {
                  lat: position.coords.latitude,
                  lng: position.coords.longitude
              };
              infoWindow.setPosition(pos);
              infoWindow.setContent('Location found.');
              map.setCenter(pos);
              //createMarker();
              var marker = new google.maps.Marker({
                  map: map,
                  position: {lat: pos.lat, lng: pos.lng}
              });

          }, function () {
              handleLocationError(true, infoWindow, map.getCenter());
        });
      }
      else {
          handleLocationError(false, infoWindow, map.getCenter());
      }
      directionsDisplay.setMap(map);

      var onChangeHandler = function(){
        count = (document.getElementById('end').value)*60; //60 is converting the Result in Seconds.
        duration = (count * 1.4) /2; //Average Human Walking Speed is 1.4m/s.
        service = new google.maps.places.PlacesService(map);

        service.nearbySearch({
            location: {lat: pos.lat, lng: pos.lng},
            radius : duration,
            type : ['place']
        }, callback);

        function callback(results, status) {
          if (status === google.maps.places.PlacesServiceStatus.OK) {
            for (var i = 0; i < results.length; i++) {
              createMarker(results[i]);
            }
          }
        }

        function createMarker(place) {
          placeLoc = place.geometry.location;
          marker = new google.maps.Marker({
            map : map,
            animation: google.maps.Animation.DROP,
            position : placeLoc
          });
          google.maps.event.addListener(marker, 'click', function(event) {
            alert(JSON.stringify(event.latLng));

            //genaue Position herausfinden wo der Klick war
            calculateAndDisplayRoute(event.latLng, directionsService, directionsDisplay);
          });
        }

      };
      document.getElementById('end').addEventListener('change', onChangeHandler);

      function calculateAndDisplayRoute(location, directionsService, directionsDisplay){
        alert(JSON.stringify(location));
          directionsService.route({
            origin: {lat: pos.lat, lng: pos.lng},
            destination: location,
            travelMode: 'WALKING'
          }, function(response, status) {
            if (status === 'OK') {
              directionsDisplay.setDirections(response);
            } else {
              window.alert('Directions request failed due to ' + status);
            }
          });
      }
  }
    </script>
  </head>
  <body>
    <b>Wähle Lernzeit: </b>
    <select id="end">
      <option value="0">---</option>
      <option value="30">30 Minuten</option>
      <option value="60">60 Minuten</option>
      <option value="90">90 Minuten</option>
      <option value="120">120 Minuten</option>
      <option value="150">150 Minuten</option>
      <option value="180">180 Minuten</option>
    </select>
    <div id="map"></div>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAa2R_MqipyTmKVkL1OnzMMAWrlvjO8VVk&libraries=places&callback=initMap" async defer>
    </script>
  </body>
</html>
